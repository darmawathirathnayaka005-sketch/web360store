<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Gallery & Uploader</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        /* Hide scrollbar for clean UI but keep functionality */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-panel shadow-sm border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 text-indigo-600">
                <i class="ph ph-images text-3xl"></i>
                <h1 class="text-xl font-bold tracking-tight">MediaCloud</h1>
            </div>
            <div id="user-status" class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full flex items-center gap-2">
                <i class="ph ph-circle-notch ph-spin"></i> Connecting...
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
        
        <!-- Upload Section -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
            <div class="max-w-xl mx-auto text-center space-y-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Upload Media</h2>
                    <p class="text-slate-500 mt-1">Share your photos, videos, or audio files.</p>
                </div>

                <div class="relative border-2 border-dashed border-indigo-200 rounded-xl p-8 hover:bg-indigo-50 transition-colors duration-200 group cursor-pointer" id="drop-zone">
                    <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*,video/*,audio/*">
                    <div class="space-y-4 pointer-events-none">
                        <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto group-hover:scale-110 transition-transform duration-200">
                            <i class="ph ph-cloud-arrow-up text-3xl text-indigo-600"></i>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-slate-700" id="file-name-display">Click or drag a file here</p>
                            <p class="text-xs text-slate-400 mt-1">Supports JPG, PNG, MP4, MP3, WAV</p>
                        </div>
                    </div>
                </div>

                <!-- Category Selection -->
                <div class="text-left w-full">
                    <label for="category-select" class="block text-sm font-medium text-slate-700 mb-1">Category</label>
                    <select id="category-select" class="w-full border-slate-200 text-slate-700 rounded-xl shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 border bg-slate-50">
                        <option value="website background images">Website Background Images</option>
                        <option value="website logo">Website Logo</option>
                        <option value="rewave media">Rewave Media</option>
                        <option value="acc advisor media">ACC Advisor Media</option>
                        <option value="growthgen media">GrowthGen Media</option>
                        <option value="hire now lanka media">Hire Now Lanka Media</option>
                    </select>
                </div>

                <!-- Progress & Status -->
                <div id="upload-status-container" class="hidden space-y-2">
                    <div class="flex justify-between text-xs font-medium text-slate-500 mb-1">
                        <span id="upload-status-text">Uploading...</span>
                        <span id="upload-percentage">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <button id="upload-btn" disabled class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-medium py-3 px-6 rounded-xl transition-colors duration-200 shadow-sm flex items-center justify-center gap-2">
                    <i class="ph ph-upload-simple"></i> Upload File
                </button>
            </div>
        </section>

        <!-- Gallery Section -->
        <section>
            <div class="flex items-center gap-2 mb-4">
                <i class="ph ph-squares-four text-xl text-slate-700"></i>
                <h3 class="text-xl font-bold text-slate-800">Recent Uploads</h3>
            </div>
            
            <!-- Category Filters -->
            <div id="category-filters" class="flex flex-wrap gap-2 mb-6">
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-indigo-600 text-white transition-colors shadow-sm" data-category="All">All</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm" data-category="website background images">Backgrounds</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm" data-category="website logo">Logos</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm" data-category="rewave media">Rewave Media</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm" data-category="acc advisor media">ACC Advisor</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm" data-category="growthgen media">GrowthGen</button>
                <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm" data-category="hire now lanka media">Hire Now Lanka</button>
            </div>

            <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Media items will be injected here -->
                <div class="col-span-full text-center py-12 text-slate-500" id="loading-gallery">
                    <i class="ph ph-spinner ph-spin text-3xl mb-2"></i>
                    <p>Loading media...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        // Your provided Firebase Configuration
        const userConfig = {
            apiKey: "AIzaSyC1Kz1F-qNrb6xQe-brXudfQQ8TIyd7fbg",
            authDomain: "web-01-646cf.firebaseapp.com",
            projectId: "web-01-646cf",
            storageBucket: "web-01-646cf.firebasestorage.app",
            messagingSenderId: "765440527400",
            appId: "1:765440527400:web:6c389d8cc97753bcd5391d",
            measurementId: "G-KF2HDMFQGX"
        };

        // Environment safeguard
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : userConfig.projectId;

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // DOM Elements
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name-display');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatusContainer = document.getElementById('upload-status-container');
        const progressBar = document.getElementById('progress-bar');
        const uploadStatusText = document.getElementById('upload-status-text');
        const uploadPercentage = document.getElementById('upload-percentage');
        const galleryGrid = document.getElementById('gallery-grid');
        const userStatus = document.getElementById('user-status');
        const loadingGallery = document.getElementById('loading-gallery');
        const categorySelect = document.getElementById('category-select');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let currentUser = null;
        let selectedFile = null;
        let allMediaItems = []; // Store fetched items globally for filtering
        let currentCategoryFilter = 'All';

        // Authentication Setup
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Authentication Error:", error);
                userStatus.innerHTML = `<i class="ph ph-warning text-red-500"></i> <span class="text-red-500">Auth Failed</span>`;
            }
        };

        // File Selection Logic
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameDisplay.textContent = selectedFile.name;
                fileNameDisplay.classList.add('text-indigo-600', 'font-semibold');
                uploadBtn.disabled = false;
            } else {
                selectedFile = null;
                fileNameDisplay.textContent = "Click or drag a file here";
                fileNameDisplay.classList.remove('text-indigo-600', 'font-semibold');
                uploadBtn.disabled = true;
            }
        });

        // Upload Logic
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile || !currentUser) return;

            // UI Update
            uploadBtn.disabled = true;
            fileInput.disabled = true;
            uploadStatusContainer.classList.remove('hidden');
            uploadStatusText.textContent = "Uploading...";
            progressBar.style.width = '0%';
            uploadPercentage.textContent = '0%';

            // Storage Path (Public structure)
            const safeFileName = `${Date.now()}_${selectedFile.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
            const storagePath = `artifacts/${appId}/public/media/${safeFileName}`;
            const storageRef = ref(storage, storagePath);

            const uploadTask = uploadBytesResumable(storageRef, selectedFile);

            uploadTask.on('state_changed',
                (snapshot) => {
                    const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    const percent = Math.round(progress) + '%';
                    progressBar.style.width = percent;
                    uploadPercentage.textContent = percent;
                },
                (error) => {
                    console.error("Upload failed:", error);
                    uploadStatusText.textContent = "Upload failed. Check console.";
                    uploadStatusText.classList.add('text-red-500');
                    resetUploadUI();
                },
                async () => {
                    try {
                        uploadStatusText.textContent = "Saving details...";
                        const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                        
                        // Save metadata to Firestore
                        const mediaCollection = collection(db, 'artifacts', appId, 'public', 'data', 'media');
                        await addDoc(mediaCollection, {
                            url: downloadURL,
                            name: selectedFile.name,
                            type: selectedFile.type,
                            size: selectedFile.size,
                            category: categorySelect.value, // Save the selected category
                            uploadedBy: currentUser.uid,
                            timestamp: serverTimestamp()
                        });

                        uploadStatusText.textContent = "Upload Complete!";
                        uploadStatusText.classList.add('text-green-600');
                        
                        // Reset after delay
                        setTimeout(() => {
                            resetUploadUI();
                            uploadStatusContainer.classList.add('hidden');
                            uploadStatusText.classList.remove('text-green-600', 'text-red-500');
                        }, 2500);

                    } catch (error) {
                        console.error("Error saving metadata:", error);
                        uploadStatusText.textContent = "Error saving file details.";
                        resetUploadUI();
                    }
                }
            );
        });

        function resetUploadUI() {
            fileInput.value = "";
            selectedFile = null;
            fileNameDisplay.textContent = "Click or drag a file here";
            fileNameDisplay.classList.remove('text-indigo-600', 'font-semibold');
            uploadBtn.disabled = true;
            fileInput.disabled = false;
            categorySelect.value = "website background images"; // Reset category to default
        }

        // Filter Button Logic
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Reset styling for all buttons
                filterBtns.forEach(b => {
                    b.className = "filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-colors shadow-sm";
                });
                
                // Style clicked button
                const clickedBtn = e.target;
                clickedBtn.className = "filter-btn px-4 py-2 rounded-full text-sm font-medium bg-indigo-600 text-white transition-colors shadow-sm";

                currentCategoryFilter = clickedBtn.dataset.category;
                applyFilterAndRender();
            });
        });

        function applyFilterAndRender() {
            let itemsToRender = allMediaItems;
            if (currentCategoryFilter !== 'All') {
                itemsToRender = allMediaItems.filter(item => item.category === currentCategoryFilter);
            }
            renderGallery(itemsToRender);
        }

        // Render Media items
        function renderGallery(items) {
            if (loadingGallery) loadingGallery.style.display = 'none';
            galleryGrid.innerHTML = '';

            if (items.length === 0) {
                galleryGrid.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-slate-100 border-dashed">
                        <i class="ph ph-empty text-4xl text-slate-300 mb-3"></i>
                        <p class="text-slate-500">No media found in this category.</p>
                    </div>`;
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow duration-200 group relative";

                let mediaContent = '';
                const isImage = item.type?.startsWith('image/');
                const isVideo = item.type?.startsWith('video/');
                const isAudio = item.type?.startsWith('audio/');

                if (isImage) {
                    mediaContent = `<img src="${item.url}" alt="${item.name}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">`;
                } else if (isVideo) {
                    mediaContent = `
                        <div class="w-full h-48 bg-slate-900 flex items-center justify-center relative">
                            <video src="${item.url}" class="w-full h-full object-cover opacity-80" controls preload="metadata"></video>
                        </div>`;
                } else if (isAudio) {
                    mediaContent = `
                        <div class="w-full h-48 bg-indigo-50 flex flex-col items-center justify-center p-4">
                            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm mb-4">
                                <i class="ph ph-music-notes text-2xl text-indigo-500"></i>
                            </div>
                            <audio src="${item.url}" controls class="w-full h-10"></audio>
                        </div>`;
                } else {
                    mediaContent = `
                        <div class="w-full h-48 bg-slate-100 flex items-center justify-center">
                            <i class="ph ph-file text-4xl text-slate-400"></i>
                        </div>`;
                }

                // Add Category Badge overlay
                const categoryBadge = `<div class="absolute top-2 right-2 bg-black/70 backdrop-blur-md text-white text-[10px] uppercase font-bold tracking-wider px-2 py-1 rounded shadow-sm z-10">${item.category || 'Uncategorized'}</div>`;

                // Format Date safely
                let dateStr = "Just now";
                if (item.timestamp) {
                    const date = item.timestamp.toDate ? item.timestamp.toDate() : new Date(item.timestamp);
                    dateStr = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                }

                card.innerHTML = `
                    <div class="relative overflow-hidden">
                        ${categoryBadge}
                        ${mediaContent}
                    </div>
                    <div class="p-4">
                        <p class="text-sm font-semibold text-slate-800 truncate" title="${item.name}">${item.name}</p>
                        <p class="text-xs text-slate-500 mt-1 flex items-center gap-1">
                            <i class="ph ph-clock"></i> ${dateStr}
                        </p>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // Setup Firestore Listener
        function setupDataListener() {
            if (!currentUser) return;

            const mediaCollection = collection(db, 'artifacts', appId, 'public', 'data', 'media');
            
            // Listen to real-time updates
            onSnapshot(mediaCollection, 
                (snapshot) => {
                    // Fetch and sort in memory as per rules
                    allMediaItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allMediaItems.sort((a, b) => {
                        const timeA = a.timestamp?.toMillis ? a.timestamp.toMillis() : 0;
                        const timeB = b.timestamp?.toMillis ? b.timestamp.toMillis() : 0;
                        return timeB - timeA; // Newest first
                    });
                    
                    applyFilterAndRender();
                },
                (error) => {
                    console.error("Firestore Listener Error:", error);
                    galleryGrid.innerHTML = `<div class="col-span-full text-red-500 p-4 bg-red-50 rounded-xl">Error loading media. Ensure your Firebase Storage and Firestore rules allow public reads/writes.</div>`;
                }
            );
        }

        // Initialize App flow
        initAuth();

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                userStatus.innerHTML = `<i class="ph ph-check-circle text-green-500"></i> <span class="text-slate-700 text-xs">Ready</span>`;
                setupDataListener();
            } else {
                userStatus.innerHTML = `<i class="ph ph-x-circle text-slate-400"></i> Disconnected`;
            }
        });
    </script>
</body>
</html>
